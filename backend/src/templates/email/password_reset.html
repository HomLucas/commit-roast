<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family:sans-serif;background:#f5f5f5;padding:24px">
<div style="max-width:560px;margin:auto;background:white;border-radius:12px;padding:32px">
  <h2 style="color:#2563eb">Password Reset</h2>
  <p>Hi <strong>{{ username }}</strong>,</p>
  <p>Click the button below to reset your password. This link expires in 1 hour.</p>
  <a href="{{ reset_link }}" style="display:block;text-align:center;background:#2563eb;color:white;padding:12px;border-radius:8px;text-decoration:none;margin-top:16px">
    Reset Password
  </a>
  <p style="margin-top:16px;color:#6b7280;font-size:12px">If you didn't request this, ignore this email.</p>
</div>
</body>
</html>
