<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family:sans-serif;background:#f5f5f5;padding:24px">
<div style="max-width:560px;margin:auto;background:white;border-radius:12px;padding:32px">
  <h2 style="color:#d97706">⭐ Points Deal Available</h2>
  <p>Hi <strong>{{ username }}</strong>,</p>
  <p style="font-size:24px;font-weight:bold;text-align:center;padding:16px;background:#fffbeb;border-radius:8px">
    {{ origin }} → {{ destination }}<br>
    <span style="color:#d97706">{{ points_required }} {{ points_program }} pts</span>
  </p>
  <p style="text-align:center;color:#6b7280">Cash price: {{ cash_price }} | Value: {{ cpp }}¢/pt</p>
</div>
</body>
</html>
