<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family:sans-serif;background:#f5f5f5;padding:24px">
<div style="max-width:560px;margin:auto;background:white;border-radius:12px;padding:32px">
  <h2 style="color:#2563eb">🔥 {{ deal_quality|title }} Deal Found!</h2>
  <p>Hi <strong>{{ username }}</strong>,</p>
  <p style="font-size:24px;font-weight:bold;text-align:center;padding:16px;background:#f0f9ff;border-radius:8px">
    {{ origin }} → {{ destination }}<br>
    <span style="color:#2563eb">{{ price }}</span>
  </p>
  {% if discount %}
  <p style="text-align:center;color:#16a34a">Save {{ discount }} off typical prices</p>
  {% endif %}
  <a href="{{ booking_link }}" style="display:block;text-align:center;background:#2563eb;color:white;padding:12px;border-radius:8px;text-decoration:none;margin-top:16px">
    View Deal
  </a>
</div>
</body>
</html>
