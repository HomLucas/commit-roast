version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flight-scanner-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flightuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: flightscanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flightuser -d flightscanner"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flight-scanner-net

  redis:
    image: redis:7-alpine
    container_name: flight-scanner-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - flight-scanner-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flight-scanner-api
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-flightuser}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/flightscanner
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - ENVIRONMENT=production
      - DEBUG=false
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - flight-scanner-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    container_name: flight-scanner-web
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - flight-scanner-net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: flight-scanner-worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-flightuser}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/flightscanner
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - flight-scanner-net

volumes:
  postgres_data:
  redis_data:

networks:
  flight-scanner-net:
    driver: bridge
